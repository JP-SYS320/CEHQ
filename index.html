<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Débits CEHQ — Rivières à Saumon</title>
<style>
  :root {
    --bg: #f0f2f3;
    --surface: #ffffff;
    --border: #d8dee0;
    --text: #1a2022;
    --muted: #6a7679;
    --accent: #3ecfb2;
    --up: #27a862;
    --down: #d94f4d;
    --bonaventure: #6ac7a0;
    --york: #7ec8e3;
    --matane: #a891d4;
    --matapedia: #e8a56a;
    --cascapedia: #e87a9a;
    --nouvelle: #88c878;
    --rimouski: #78aed4;
    --dartmouth: #d4c068;
    --petite: #c8a0d4;
    --ste-anne: #88b8d4;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(–bg); }

body {
color: var(–text);
font-family: ‘SF Mono’, ‘Fira Mono’, ‘Courier New’, monospace;
min-height: 100vh;
padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

header {
padding: 16px 16px 10px;
border-bottom: 1px solid var(–border);
position: sticky;
top: 0;
background: var(–bg);
z-index: 100;
}

.header-top {
display: flex;
align-items: flex-start;
justify-content: space-between;
gap: 12px;
}

.site-title {
font-family: Georgia, serif;
font-size: 1.1rem;
font-style: italic;
color: var(–accent);
letter-spacing: 0.02em;
line-height: 1.2;
}

.site-subtitle {
font-size: 0.58rem;
color: var(–muted);
letter-spacing: 0.12em;
text-transform: uppercase;
margin-top: 3px;
}

.refresh-btn {
background: none;
border: 1.5px solid #b0bbbf;
color: var(–muted);
font-family: inherit;
font-size: 0.65rem;
padding: 6px 10px;
border-radius: 6px;
cursor: pointer;
letter-spacing: 0.08em;
white-space: nowrap;
transition: border-color 0.2s, color 0.2s;
flex-shrink: 0;
-webkit-appearance: none;
appearance: none;
}

.refresh-btn:active { border-color: var(–accent); color: var(–accent); }
.refresh-btn.loading { animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.last-update {
font-size: 0.56rem;
color: var(–muted);
margin-top: 6px;
letter-spacing: 0.06em;
}

.status-bar {
display: flex;
padding: 9px 16px;
border-bottom: 1px solid var(–border);
align-items: center;
overflow-x: auto;
white-space: nowrap;
}

.stat-pill {
display: inline-flex;
align-items: center;
gap: 5px;
font-size: 0.6rem;
letter-spacing: 0.06em;
color: var(–muted);
flex-shrink: 0;
}

.stat-val { color: var(–text); font-weight: 700; }

.filters {
display: flex;
gap: 8px;
padding: 10px 16px;
border-bottom: 1px solid var(–border);
}

.filter-btn {
background: none;
border: 1.5px solid #b0bbbf;
color: var(–muted);
font-family: inherit;
font-size: 0.6rem;
padding: 5px 12px;
border-radius: 20px;
cursor: pointer;
letter-spacing: 0.08em;
transition: all 0.2s;
-webkit-appearance: none;
appearance: none;
}

.filter-btn.active {
background: none;
border: 2px solid var(–accent);
color: var(–accent);
font-weight: 700;
}

.grid {
padding: 10px 16px;
display: flex;
flex-direction: column;
gap: 8px;
}

@media (min-width: 600px) {
.grid { display: grid; grid-template-columns: 1fr 1fr; }
}

.card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 8px;
padding: 12px 12px 12px 16px;
cursor: pointer;
transition: border-color 0.2s, transform 0.12s;
position: relative;
}

.card:active { transform: scale(0.99); }
.card.expanded { border-color: var(–accent); }

.card-color-bar {
position: absolute;
left: 0; top: 0; bottom: 0;
width: 4px;
border-radius: 8px 0 0 8px;
}

.card-header {
display: flex;
align-items: center;
justify-content: space-between;
gap: 8px;
}

.river-name {
font-family: Georgia, serif;
font-size: 1rem;
font-weight: 700;
line-height: 1.1;
}

.station-id {
font-size: 0.52rem;
color: var(–muted);
letter-spacing: 0.1em;
margin-top: 2px;
}

.debit-main { text-align: right; flex-shrink: 0; }

.debit-value {
font-size: 1.4rem;
font-weight: 700;
line-height: 1;
letter-spacing: -0.02em;
}

.debit-unit { font-size: 0.52rem; color: var(–muted); letter-spacing: 0.06em; }

.trend-badge {
display: inline-flex;
align-items: center;
gap: 3px;
font-size: 0.58rem;
padding: 2px 6px;
border-radius: 3px;
margin-top: 3px;
letter-spacing: 0.04em;
}

.trend-up   { background: rgba(39,168,98,0.12);   color: var(–up); }
.trend-down { background: rgba(217,79,77,0.12);   color: var(–down); }
.trend-nd   { background: rgba(106,118,121,0.15); color: var(–muted); }

.sparkline-row {
margin-top: 10px;
display: flex;
align-items: flex-end;
gap: 2px;
height: 24px;
}

.spark-bar { flex: 1; border-radius: 2px 2px 0 0; min-height: 2px; }

.status-msg {
font-size: 0.58rem;
color: var(–muted);
padding: 4px 0 0;
letter-spacing: 0.04em;
min-height: 16px;
}

.status-msg.ok  { color: var(–accent); }
.status-msg.err { color: var(–down); }

.detail {
display: none;
margin-top: 10px;
padding-top: 10px;
border-top: 1px solid var(–border);
}

.card.expanded .detail { display: block; }

.detail-grid {
display: grid;
gap: 6px;
margin-bottom: 8px;
}

.detail-item {
background: #f7f8f9;
border-radius: 6px;
padding: 7px 9px;
}

.detail-label {
font-size: 0.52rem;
color: var(–muted);
letter-spacing: 0.08em;
text-transform: uppercase;
margin-bottom: 3px;
}

.detail-val { font-size: 0.82rem; font-weight: 700; color: var(–text); }

.reload-btn {
width: 100%;
background: none;
border: 1.5px solid var(–accent);
color: var(–accent);
font-family: inherit;
font-size: 0.62rem;
padding: 7px;
border-radius: 6px;
cursor: pointer;
letter-spacing: 0.08em;
text-transform: uppercase;
-webkit-appearance: none;
appearance: none;
}

.reload-btn:active { background: rgba(62,207,178,0.08); border-color: var(–accent); }

footer {
padding: 16px;
text-align: center;
font-size: 0.52rem;
color: var(–muted);
letter-spacing: 0.08em;
border-top: 1px solid var(–border);
margin-top: 8px;
}
</style>

</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="site-title">Rivières à Saumon</div>
      <div class="site-subtitle">Débits CEHQ — Québec</div>
    </div>
    <button class="refresh-btn" id="refreshAll" onclick="refreshAll()">↻ Actualiser</button>
  </div>
  <div class="last-update" id="lastUpdate">Dernière mise à jour : —</div>
</header>

<div class="status-bar">
  <div class="stat-pill">
    🌑 Nouv. lune&nbsp;<span class="stat-val" id="nextNew">—</span>&nbsp;<span id="nextNewDays"></span>
  </div>
  <div class="stat-pill" style="margin-left:10px;padding-left:10px;border-left:1px solid var(--border)">
    🌕 Pleine lune&nbsp;<span class="stat-val" id="nextFull">—</span>&nbsp;<span id="nextFullDays"></span>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="filterStations('gaspesie', this)">Gaspésie</button>
  <button class="filter-btn" onclick="filterStations('bas-st-laurent', this)">Bas-St-Laurent</button>
</div>

<div class="grid" id="stationGrid"></div>

<footer>SOURCE : CEHQ — CENTRE D'EXPERTISE HYDRIQUE DU QUÉBEC</footer>

<script>
// ─── Phases lunaires 2026-2027 (NASA) ────────────────────────────────────────
const MOON = {
  new:  ['2026-01-29','2026-02-28','2026-03-29','2026-04-28','2026-05-16',
         '2026-06-15','2026-07-14','2026-08-12','2026-09-11','2026-10-10',
         '2026-11-09','2026-12-09','2027-01-07','2027-02-06','2027-03-08'],
  full: ['2026-01-13','2026-02-12','2026-03-13','2026-04-12','2026-05-01',
         '2026-05-31','2026-06-30','2026-07-29','2026-08-28','2026-09-26',
         '2026-10-26','2026-11-24','2026-12-24','2027-01-22','2027-02-20'],
};
const MOIS = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];

function nextMoon(type) {
  const today = new Date(); today.setHours(0,0,0,0);
  for (const s of MOON[type]) {
    const d = new Date(s + 'T12:00:00');
    if (d >= today) {
      const diff = Math.round((d - today) / 86400000);
      return { label: `${d.getDate()} ${MOIS[d.getMonth()]}`, diff };
    }
  }
  return { label: '—', diff: 0 };
}

function updateMoon() {
  const n = nextMoon('new'), f = nextMoon('full');
  document.getElementById('nextNew').textContent     = n.label;
  document.getElementById('nextNewDays').textContent = n.diff === 0 ? '· auj.' : `· ${n.diff}j`;
  document.getElementById('nextFull').textContent    = f.label;
  document.getElementById('nextFullDays').textContent= f.diff === 0 ? '· auj.' : `· ${f.diff}j`;
}

// ─── Stations ────────────────────────────────────────────────────────────────
const STATIONS = [
  { id:'010802', name:'Bonaventure',       color:'--bonaventure', region:'gaspesie',      lat:48.0667, lng:-65.4833 },
  { id:'010902', name:'Petite Cascapédia', color:'--petite',      region:'gaspesie',      lat:48.0833, lng:-65.6667 },
  { id:'011003', name:'Cascapédia',        color:'--cascapedia',  region:'gaspesie',      lat:48.1000, lng:-65.8500 },
  { id:'011204', name:'Nouvelle',          color:'--nouvelle',    region:'gaspesie',      lat:48.1167, lng:-66.3167 },
  { id:'011509', name:'Matapédia',         color:'--matapedia',   region:'gaspesie',      lat:48.0000, lng:-66.9833 },
  { id:'020404', name:'York',              color:'--york',        region:'gaspesie',      lat:48.8333, lng:-64.6667 },
  { id:'021407', name:'Sainte-Anne',       color:'--ste-anne',    region:'gaspesie',      lat:49.0000, lng:-66.7000 },
  { id:'021601', name:'Matane',            color:'--matane',      region:'bas-st-laurent', lat:48.8500, lng:-67.5333 },
  { id:'022003', name:'Rimouski',          color:'--rimouski',    region:'bas-st-laurent', lat:48.4500, lng:-68.5333 },
  { id:'020602', name:'Dartmouth',         color:'--dartmouth',   region:'gaspesie',      lat:48.7000, lng:-64.8000 },
];

// ─── État ────────────────────────────────────────────────────────────────────
const state = {};
STATIONS.forEach(s => {
  state[s.id] = { debit:null, trend:null, status:'idle', msg:'', expanded:false,
                  sunrise:null, sunset:null, var24h:null, max24h:null, min24h:null };
});

// ─── API MSP ─────────────────────────────────────────────────────────────────
const WFS_URL = 'https://geoegl.msp.gouv.qc.ca/apis/mapserver-vigilance/ws/vigilance.fcgi?service=wfs&version=1.1.0&request=getfeature&typename=stations_igo2_public&outputformat=geojson';
let wfsCache = null, wfsCacheTime = 0;

async function fetchAllStations() {
  const now = Date.now();
  if (wfsCache && (now - wfsCacheTime) < 5 * 60 * 1000) return wfsCache;
  const res = await fetch(WFS_URL, { cache: 'no-store' });
  if (!res.ok) throw new Error('API MSP indisponible');
  wfsCache = await res.json();
  wfsCacheTime = now;
  return wfsCache;
}

async function fetchDebit(stationId) {
  const geojson = await fetchAllStations();
  const feat = geojson.features.find(f =>
    f.properties.station && f.properties.station.toString().trim() === stationId
  );
  if (!feat) throw new Error(`Station ${stationId} non trouvée`);
  const p = feat.properties;
  const debit = parseFloat(p.dern_valeur_deb);
  if (isNaN(debit) || debit < 0) throw new Error('Débit non disponible');
  const timestamp = p.dern_date_prise_valeur_utc
    ? p.dern_date_prise_valeur_utc.replace('T',' ').substring(0,16) + ' UTC'
    : '—';

  let trend = null, var24h = null, max24h = null, min24h = null;
  try {
    let hist = JSON.parse(localStorage.getItem(`hist_${stationId}`) || '[]');
    if (!hist.some(e => e.ts === timestamp)) {
      hist.push({ debit, ts: timestamp });
      if (hist.length > 96) hist = hist.slice(-96);
      localStorage.setItem(`hist_${stationId}`, JSON.stringify(hist));
    }
    if (hist.length >= 6) {
      const r = hist.slice(-3).map(e=>e.debit), o = hist.slice(-6,-3).map(e=>e.debit);
      const avgR = r.reduce((a,b)=>a+b,0)/r.length, avgO = o.reduce((a,b)=>a+b,0)/o.length;
      const pct = (avgR - avgO) / (avgO || 1);
      trend = pct > 0.03 ? 'up' : pct < -0.03 ? 'down' : 'stable';
    }
    if (hist.length >= 2) {
      const vals = hist.map(e=>e.debit);
      max24h = Math.max(...vals);
      min24h = Math.min(...vals);
      var24h = ((debit - hist[0].debit) / (hist[0].debit || 1)) * 100;
    }
  } catch(e) {}

  return { debit, trend, timestamp, var24h, max24h, min24h };
}

// ─── Sunrise/Sunset — cache localStorage par jour ────────────────────────────
async function fetchSunTimes(stationId) {
  const s = STATIONS.find(x => x.id === stationId);
  if (!s) return null;
  const today = new Date().toISOString().substring(0,10);
  const key = `sun_${stationId}_${today}`;
  try {
    const cached = localStorage.getItem(key);
    if (cached) return JSON.parse(cached);
    const res = await fetch(
      `https://api.sunrisesunset.io/json?lat=${s.lat}&lng=${s.lng}&timezone=America/Toronto&time_format=HH:mm`,
      { cache: 'no-store' }
    );
    const json = await res.json();
    if (json.status === 'OK') {
      const sun = { sunrise: json.results.sunrise, sunset: json.results.sunset };
      localStorage.setItem(key, JSON.stringify(sun));
      return sun;
    }
  } catch(e) {}
  return null;
}

// ─── Charger une station ──────────────────────────────────────────────────────
async function loadStation(stationId) {
  state[stationId].status = 'loading';
  state[stationId].msg = 'Chargement...';
  renderCard(stationId);

  try {
    const data = await fetchDebit(stationId);
    Object.assign(state[stationId], {
      debit: data.debit, trend: data.trend,
      var24h: data.var24h, max24h: data.max24h, min24h: data.min24h,
      status: 'ok', msg: data.timestamp ? `Mesure : ${data.timestamp}` : 'Données reçues'
    });
    renderCard(stationId);

    // Sunrise/sunset en arrière-plan (caché par jour)
    fetchSunTimes(stationId).then(sun => {
      if (sun) {
        state[stationId].sunrise = sun.sunrise;
        state[stationId].sunset  = sun.sunset;
        renderCard(stationId);
      }
    }).catch(() => {});

  } catch(e) {
    state[stationId].status = 'error';
    state[stationId].msg = 'Erreur — ' + (e.message || 'inconnu');
    renderCard(stationId);
  }
}

// ─── Actualiser tout ──────────────────────────────────────────────────────────
function refreshAll() {
  const btn = document.getElementById('refreshAll');
  btn.classList.add('loading');
  btn.textContent = '↻ Chargement...';
  const done = () => {
    btn.classList.remove('loading');
    btn.textContent = '↻ Actualiser';
    const now = new Date();
    document.getElementById('lastUpdate').textContent =
      `Dernière mise à jour : ${now.toLocaleDateString('fr-CA')} ${now.toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'})}`;
  };
  Promise.race([
    Promise.all(STATIONS.map(s => loadStation(s.id))),
    new Promise(r => setTimeout(r, 12000))
  ]).then(done);
}

// ─── CSS var cache ────────────────────────────────────────────────────────────
const cssCache = {};
function getCSSVar(name) {
  if (!cssCache[name])
    cssCache[name] = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  return cssCache[name];
}

// ─── Mini sparkline ───────────────────────────────────────────────────────────
function buildSpark(history, color) {
  if (!history || !history.length) return '';
  const max = Math.max(...history);
  return history.map((v, i) => {
    const pct = Math.max(10, (v / max) * 100);
    const c = i === history.length-1 ? getCSSVar(color) : 'var(--border)';
    return `<div class="spark-bar" style="height:${pct}%;background:${c}"></div>`;
  }).join('');
}

// ─── Rendu carte ──────────────────────────────────────────────────────────────
function renderCard(stationId) {
  const s = STATIONS.find(x => x.id === stationId);
  const st = state[stationId];
  const card = document.getElementById(`card-${stationId}`);
  if (!card) return;

  const col = getCSSVar(s.color);
  card.querySelector('.card-color-bar').style.background = col;

  const debitEl = card.querySelector('.debit-value');
  if (st.status === 'loading') {
    debitEl.textContent = '···';
    debitEl.style.color = 'var(--muted)';
  } else if (st.debit !== null) {
    debitEl.textContent = st.debit.toFixed(1);
    debitEl.style.color = col;
  } else {
    debitEl.textContent = '—';
    debitEl.style.color = 'var(--muted)';
  }

  const tb = card.querySelector('.trend-badge');
  if (st.trend === 'up')      { tb.className='trend-badge trend-up';   tb.textContent='↑ Montante'; }
  else if (st.trend==='down') { tb.className='trend-badge trend-down'; tb.textContent='↓ Descendante'; }
  else if (st.trend==='stable'){tb.className='trend-badge trend-nd';   tb.textContent='→ Stable'; }
  else                         { tb.className='trend-badge trend-nd';   tb.textContent='— N/D'; }

  card.querySelector('.sparkline-row').innerHTML = buildSpark(st.debit ? [st.debit] : [1], s.color);

  const msg = card.querySelector('.status-msg');
  msg.textContent = st.msg || '';
  msg.className = 'status-msg' + (st.status==='ok' ? ' ok' : st.status==='error' ? ' err' : '');

  if (st.expanded) {
    const fmt = v => v !== null ? v.toFixed(1) + ' m³/s' : 'N/D';
    const varEl = card.querySelector('.dv-var');
    if (st.var24h !== null) {
      const sign = st.var24h >= 0 ? '+' : '';
      varEl.textContent = `${sign}${st.var24h.toFixed(1)} %`;
      varEl.style.color = st.var24h > 3 ? 'var(--up)' : st.var24h < -3 ? 'var(--down)' : 'var(--muted)';
    } else { varEl.textContent = 'N/D'; varEl.style.color = 'var(--muted)'; }
    card.querySelector('.dv-max24').textContent  = fmt(st.max24h);
    card.querySelector('.dv-min24').textContent  = fmt(st.min24h);
    card.querySelector('.dv-sunrise').textContent = st.sunrise || 'N/D';
    card.querySelector('.dv-sunset').textContent  = st.sunset  || 'N/D';
  }
}

// ─── Toggle ───────────────────────────────────────────────────────────────────
function toggleCard(id) {
  const st = state[id];
  st.expanded = !st.expanded;
  const card = document.getElementById(`card-${id}`);
  if (st.expanded) {
    card.classList.add('expanded');
    if (st.status === 'idle') loadStation(id);
    else renderCard(id);
  } else {
    card.classList.remove('expanded');
  }
}

// ─── Filtre ───────────────────────────────────────────────────────────────────
function filterStations(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(card => {
    const s = STATIONS.find(x => x.id === card.dataset.id);
    card.style.display = s.region === filter ? '' : 'none';
  });
}

// ─── Construction cartes ──────────────────────────────────────────────────────
function buildCards() {
  const grid = document.getElementById('stationGrid');
  grid.innerHTML = '';
  STATIONS.forEach(s => {
    const div = document.createElement('div');
    div.className = 'card';
    div.id = `card-${s.id}`;
    div.dataset.id = s.id;
    div.onclick = () => toggleCard(s.id);
    div.innerHTML = `
      <div class="card-color-bar"></div>
      <div class="card-header">
        <div>
          <div class="river-name">${s.name}</div>
          <div class="station-id">STATION ${s.id}</div>
        </div>
        <div class="debit-main">
          <div class="debit-value" style="color:var(--muted)">—</div>
          <div class="debit-unit">m³/s</div>
          <div class="trend-badge trend-nd">— N/D</div>
        </div>
      </div>
      <div class="sparkline-row"></div>
      <div class="status-msg"></div>
      <div class="detail">
        <div class="detail-grid" style="grid-template-columns:1fr 1fr 1fr">
          <div class="detail-item">
            <div class="detail-label">Variation 24h</div>
            <div class="detail-val dv-var">—</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Max 24h</div>
            <div class="detail-val dv-max24">—</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Min 24h</div>
            <div class="detail-val dv-min24">—</div>
          </div>
        </div>
        <div class="detail-grid" style="grid-template-columns:1fr 1fr;margin-top:6px">
          <div class="detail-item">
            <div class="detail-label">🌅 Lever</div>
            <div class="detail-val dv-sunrise">—</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">🌇 Coucher</div>
            <div class="detail-val dv-sunset">—</div>
          </div>
        </div>
        <button class="reload-btn" style="margin-top:8px;display:block" onclick="event.stopPropagation();loadStation('${s.id}')">
          ↻ Recharger cette station
        </button>
      </div>`;
    grid.appendChild(div);
  });
}

// ─── Init ─────────────────────────────────────────────────────────────────────
buildCards();
updateMoon();
filterStations('gaspesie', document.querySelector('.filter-btn'));
refreshAll();
</script>
