<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Débits CEHQ — Rivières à Saumon</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f3;
    --surface: #ffffff;
    --border: #d8dee0;
    --text: #1a2022;
    --muted: #6a7679;
    --accent: #3ecfb2;
    --up: #4ade9a;
    --down: #f06260;
    --warn: #f0c060;
    --bonaventure: #6ac7a0;
    --york: #7ec8e3;
    --matane: #a891d4;
    --matapedia: #e8a56a;
    --cascapedia: #e87a9a;
    --nouvelle: #88c878;
    --rimouski: #78aed4;
    --dartmouth: #d4c068;
    --petite: #c8a0d4;
    --ste-anne: #88b8d4;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

html {
background: #f0f2f3;
}

body {
background: var(–bg);
color: var(–text);
font-family: ‘Space Mono’, monospace;
min-height: 100vh;
padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* Header */
header {
padding: 20px 16px 12px;
border-bottom: 1px solid var(–border);
position: sticky;
top: 0;
background: var(–bg);
z-index: 100;
backdrop-filter: blur(10px);
}

.header-top {
display: flex;
align-items: flex-start;
justify-content: space-between;
gap: 12px;
}

.site-title {
font-family: ‘Libre Baskerville’, serif;
font-size: 1.1rem;
font-style: italic;
color: var(–accent);
letter-spacing: 0.02em;
line-height: 1.2;
}

.site-subtitle {
font-size: 0.6rem;
color: var(–muted);
letter-spacing: 0.12em;
text-transform: uppercase;
margin-top: 3px;
}

.refresh-btn {
background: none;
border: 1px solid var(–border);
color: var(–muted);
font-family: ‘Space Mono’, monospace;
font-size: 0.65rem;
padding: 6px 10px;
border-radius: 4px;
cursor: pointer;
letter-spacing: 0.08em;
white-space: nowrap;
transition: all 0.2s;
flex-shrink: 0;
}

.refresh-btn:hover, .refresh-btn:active {
border-color: var(–accent);
color: var(–accent);
}

.refresh-btn.loading {
animation: pulse 1s infinite;
}

@keyframes pulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.4; }
}

.last-update {
font-size: 0.58rem;
color: var(–muted);
margin-top: 8px;
letter-spacing: 0.06em;
}

/* Status bar */
.status-bar {
display: flex;
gap: 16px;
padding: 10px 16px;
border-bottom: 1px solid var(–border);
overflow-x: auto;
scrollbar-width: none;
}
.status-bar::-webkit-scrollbar { display: none; }

.stat-pill {
display: flex;
align-items: center;
gap: 6px;
flex-shrink: 0;
font-size: 0.6rem;
letter-spacing: 0.08em;
color: var(–muted);
}

.stat-dot {
width: 6px;
height: 6px;
border-radius: 50%;
}

.stat-val {
color: var(–text);
font-weight: 700;
}

/* Region filters */
.filters {
display: flex;
gap: 8px;
padding: 12px 16px;
overflow-x: auto;
scrollbar-width: none;
border-bottom: 1px solid var(–border);
}
.filters::-webkit-scrollbar { display: none; }

.filter-btn {
background: none;
border: 1px solid var(–border);
color: var(–muted);
font-family: ‘Space Mono’, monospace;
font-size: 0.6rem;
padding: 5px 10px;
border-radius: 20px;
cursor: pointer;
white-space: nowrap;
letter-spacing: 0.08em;
transition: all 0.2s;
flex-shrink: 0;
}

.filter-btn.active {
background: var(–accent);
border-color: var(–accent);
color: var(–bg);
}

/* Main grid */
.grid {
padding: 12px 16px;
display: flex;
flex-direction: column;
gap: 8px;
}

/* Station card */
.card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 8px;
padding: 14px;
cursor: pointer;
transition: border-color 0.2s, transform 0.15s;
position: relative;
overflow: hidden;
}

.card::before {
content: ‘’;
position: absolute;
left: 0;
top: 0;
bottom: 0;
width: 3px;
border-radius: 8px 0 0 8px;
}

.card:active { transform: scale(0.99); }
.card.expanded { border-color: #2a3436; }

.card-header {
display: flex;
align-items: center;
justify-content: space-between;
gap: 8px;
}

.river-name {
font-family: ‘Libre Baskerville’, serif;
font-size: 1rem;
font-weight: 700;
line-height: 1.1;
}

.station-id {
font-size: 0.55rem;
color: var(–muted);
letter-spacing: 0.1em;
margin-top: 2px;
}

.debit-main {
text-align: right;
flex-shrink: 0;
}

.debit-value {
font-size: 1.4rem;
font-weight: 700;
line-height: 1;
letter-spacing: -0.02em;
}

.debit-unit {
font-size: 0.55rem;
color: var(–muted);
letter-spacing: 0.06em;
}

.trend-badge {
display: inline-flex;
align-items: center;
gap: 3px;
font-size: 0.6rem;
padding: 2px 6px;
border-radius: 3px;
margin-top: 3px;
letter-spacing: 0.06em;
}

.trend-up { background: rgba(74, 222, 154, 0.12); color: var(–up); }
.trend-down { background: rgba(240, 98, 96, 0.12); color: var(–down); }
.trend-stable { background: rgba(90, 99, 102, 0.2); color: var(–muted); }

/* Mini sparkline */
.sparkline-row {
margin-top: 12px;
display: flex;
align-items: flex-end;
gap: 2px;
height: 28px;
}

.spark-bar {
flex: 1;
border-radius: 2px 2px 0 0;
min-height: 2px;
transition: height 0.4s ease;
}

/* Expanded detail */
.detail {
display: none;
margin-top: 12px;
padding-top: 12px;
border-top: 1px solid var(–border);
}

.card.expanded .detail { display: block; }

.detail-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 8px;
margin-bottom: 12px;
}

.detail-item {
background: rgba(255,255,255,0.03);
border-radius: 6px;
padding: 8px 10px;
}

.detail-label {
font-size: 0.55rem;
color: var(–muted);
letter-spacing: 0.1em;
text-transform: uppercase;
margin-bottom: 3px;
}

.detail-val {
font-size: 0.85rem;
font-weight: 700;
}

.fetch-btn {
width: 100%;
background: none;
border: 1px solid var(–border);
color: var(–accent);
font-family: ‘Space Mono’, monospace;
font-size: 0.65rem;
padding: 8px;
border-radius: 6px;
cursor: pointer;
letter-spacing: 0.1em;
transition: all 0.2s;
text-transform: uppercase;
}

.fetch-btn:hover, .fetch-btn:active {
background: rgba(62, 207, 178, 0.08);
border-color: var(–accent);
}

.fetch-btn.loading {
color: var(–muted);
animation: pulse 1s infinite;
}

/* 7-day chart */
.chart-container {
margin-top: 12px;
}

.chart-title {
font-size: 0.58rem;
color: var(–muted);
letter-spacing: 0.1em;
text-transform: uppercase;
margin-bottom: 8px;
}

.chart-wrap {
height: 60px;
position: relative;
}

svg.linechart {
width: 100%;
height: 100%;
overflow: visible;
}

/* Alert level indicator */
.level-bar {
margin-top: 10px;
height: 4px;
background: var(–border);
border-radius: 2px;
overflow: hidden;
position: relative;
}

.level-fill {
height: 100%;
border-radius: 2px;
transition: width 0.6s ease;
}

.level-label {
display: flex;
justify-content: space-between;
margin-top: 4px;
font-size: 0.5rem;
color: var(–muted);
letter-spacing: 0.06em;
}

/* Loading skeleton */
.skeleton {
background: linear-gradient(90deg, var(–surface) 25%, var(–border) 50%, var(–surface) 75%);
background-size: 200% 100%;
animation: shimmer 1.5s infinite;
border-radius: 4px;
}

@keyframes shimmer {
0% { background-position: 200% 0; }
100% { background-position: -200% 0; }
}

/* Status message */
.status-msg {
font-size: 0.62rem;
color: var(–muted);
padding: 4px 0;
letter-spacing: 0.06em;
min-height: 18px;
}

.status-msg.ok { color: var(–up); }
.status-msg.err { color: var(–down); }
.status-msg.warn { color: var(–warn); }

/* Footer */
footer {
padding: 20px 16px;
text-align: center;
font-size: 0.55rem;
color: var(–muted);
letter-spacing: 0.1em;
border-top: 1px solid var(–border);
margin-top: 8px;
}

/* Responsive wider screens */
@media (min-width: 600px) {
.grid {
display: grid;
grid-template-columns: 1fr 1fr;
}
}
</style>

</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="site-title">Rivières à Saumon</div>
      <div class="site-subtitle">Débits CEHQ — Québec</div>
    </div>
    <button class="refresh-btn" id="refreshAll" onclick="refreshAll()">↻ Actualiser</button>
  </div>
  <div class="last-update" id="lastUpdate">Dernière mise à jour : —</div>
</header>

<div class="status-bar">
  <div class="stat-pill">
    <span>🌑</span>
    <span>Nouv. lune</span>
    <span class="stat-val" id="nextNew">—</span>
    <span style="font-size:0.55rem;color:var(--muted)" id="nextNewDays"></span>
  </div>
  <div class="stat-pill" style="border-left:1px solid var(--border);padding-left:16px">
    <span>🌕</span>
    <span>Pleine lune</span>
    <span class="stat-val" id="nextFull">—</span>
    <span style="font-size:0.55rem;color:var(--muted)" id="nextFullDays"></span>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="filterStations('gaspesie', this)">Gaspésie</button>
  <button class="filter-btn" onclick="filterStations('bas-st-laurent', this)">Bas-St-Laurent</button>
</div>

<div class="grid" id="stationGrid"></div>

<footer>
  SOURCE : CEHQ — CENTRE D'EXPERTISE HYDRIQUE DU QUÉBEC<br>
  DONNÉES EN TEMPS QUASI-RÉEL · PROXY REQUIS EN PRODUCTION
</footer>

<script>
// ─── Phases lunaires 2026-2027 (dates UTC, source NASA) ──────────────────────
const MOON_PHASES = {
  new:  ['2026-01-29','2026-02-28','2026-03-29','2026-04-28','2026-05-16',
         '2026-06-15','2026-07-14','2026-08-12','2026-09-11','2026-10-10',
         '2026-11-09','2026-12-09','2027-01-07','2027-02-06','2027-03-08'],
  full: ['2026-01-13','2026-02-12','2026-03-13','2026-04-12','2026-05-01',
         '2026-05-31','2026-06-30','2026-07-29','2026-08-28','2026-09-26',
         '2026-10-26','2026-11-24','2026-12-24','2027-01-22','2027-02-20'],
};

const MOIS_FR = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];

function nextMoonDate(type) {
  const today = new Date();
  today.setHours(0,0,0,0);
  for (const dateStr of MOON_PHASES[type]) {
    const d = new Date(dateStr + 'T12:00:00');
    if (d >= today) {
      const diff = Math.round((d - today) / 86400000);
      const label = `${d.getDate()} ${MOIS_FR[d.getMonth()]}`;
      return { label, diff };
    }
  }
  return { label: '—', diff: 0 };
}

function updateMoonDisplay() {
  const newMoon  = nextMoonDate('new');
  const fullMoon = nextMoonDate('full');
  document.getElementById('nextNew').textContent      = newMoon.label;
  document.getElementById('nextNewDays').textContent  = newMoon.diff === 0 ? '· auj.' : `· ${newMoon.diff}j`;
  document.getElementById('nextFull').textContent     = fullMoon.label;
  document.getElementById('nextFullDays').textContent = fullMoon.diff === 0 ? '· auj.' : `· ${fullMoon.diff}j`;
}

// ─── Station data ───────────────────────────────────────────────────────────
const STATIONS = [
  { id: '010802', name: 'Bonaventure',       color: '--bonaventure', region: 'gaspesie',     lat: 48.0667, lng: -65.4833 },
  { id: '010902', name: 'Petite Cascapédia', color: '--petite',      region: 'gaspesie',     lat: 48.0833, lng: -65.6667 },
  { id: '011003', name: 'Cascapédia',        color: '--cascapedia',  region: 'gaspesie',     lat: 48.1000, lng: -65.8500 },
  { id: '011204', name: 'Nouvelle',          color: '--nouvelle',    region: 'gaspesie',     lat: 48.1167, lng: -66.3167 },
  { id: '011509', name: 'Matapédia',         color: '--matapedia',   region: 'gaspesie',     lat: 48.0000, lng: -66.9833 },
  { id: '020404', name: 'York',              color: '--york',        region: 'gaspesie',     lat: 48.8333, lng: -64.6667 },
  { id: '021407', name: 'Sainte-Anne',       color: '--ste-anne',    region: 'gaspesie',     lat: 49.0000, lng: -66.7000 },
  { id: '021601', name: 'Matane',            color: '--matane',      region: 'bas-st-laurent', lat: 48.8500, lng: -67.5333 },
  { id: '022003', name: 'Rimouski',          color: '--rimouski',    region: 'bas-st-laurent', lat: 48.4500, lng: -68.5333 },
  { id: '020602', name: 'Dartmouth',         color: '--dartmouth',   region: 'gaspesie',     lat: 48.7000, lng: -64.8000 },
];

// ─── State ──────────────────────────────────────────────────────────────────
const state = {};
STATIONS.forEach(s => {
  state[s.id] = {
    debit: null,
    trend: null,
    history: null,
    status: 'idle',
    msg: '',
    expanded: false,
    sunrise: null,
    sunset: null,
    var24h: null,
    max24h: null,
    min24h: null,
  };
});

// ─── Real CEHQ fetch via allorigins proxy ────────────────────────────────────
// ─── API WFS MSP — filtrée sur nos 10 stations seulement ─────────────────────
const WFS_URL = `https://geoegl.msp.gouv.qc.ca/apis/mapserver-vigilance/ws/vigilance.fcgi?service=wfs&version=1.1.0&request=getfeature&typename=stations_igo2_public&outputformat=geojson`;

let wfsCache = null;
let wfsCacheTime = 0;

async function fetchAllStations() {
  const now = Date.now();
  // Rafraîchir le cache toutes les 5 minutes max
  if (wfsCache && (now - wfsCacheTime) < 5 * 60 * 1000) return wfsCache;

  const res = await fetch(WFS_URL, { cache: 'no-store' });
  if (!res.ok) throw new Error('API MSP indisponible');
  const json = await res.json();
  wfsCache = json;
  wfsCacheTime = now;
  return json;
}

async function fetchDebit(stationId) {
  // Débit actuel via API MSP uniquement (rapide, pas de CORS)
  const geojson = await fetchAllStations();
  const feature = geojson.features.find(f =>
    f.properties.station && f.properties.station.toString().trim() === stationId.toString().trim()
  );
  if (!feature) throw new Error(`Station ${stationId} non trouvée`);
  const props = feature.properties;
  const debit = parseFloat(props.dern_valeur_deb);
  if (isNaN(debit) || debit < 0) throw new Error('Débit non disponible');
  const timestamp = props.dern_date_prise_valeur_utc
    ? props.dern_date_prise_valeur_utc.replace('T', ' ').substring(0, 16) + ' UTC'
    : '—';

  // Historique local 24h : stocker jusqu'à 96 entrées (24h à 15min)
  let trend = 'stable';
  let var24h = null, max24h = null, min24h = null;
  const storageKey = `hist_${stationId}`;
  try {
    let hist = JSON.parse(localStorage.getItem(storageKey) || '[]');

    // Ajouter seulement si timestamp nouveau
    const alreadyStored = hist.some(e => e.ts === timestamp);
    if (!alreadyStored) {
      hist.push({ debit, ts: timestamp });
      if (hist.length > 96) hist = hist.slice(-96);
      localStorage.setItem(storageKey, JSON.stringify(hist));
    }

    // Tendance : 3 dernières vs 3 d'avant (min 6 entrées)
    if (hist.length >= 6) {
      const recent = hist.slice(-3).map(e => e.debit);
      const older  = hist.slice(-6, -3).map(e => e.debit);
      const avgR = recent.reduce((a,b) => a+b,0) / recent.length;
      const avgO = older.reduce((a,b) => a+b,0) / older.length;
      const pct  = (avgR - avgO) / (avgO || 1);
      if (pct > 0.03) trend = 'up';
      else if (pct < -0.03) trend = 'down';
      else trend = 'stable';
    } else {
      trend = null;
    }

    // Stats 24h : max, min, variation (première vs dernière valeur des 96 entrées)
    if (hist.length >= 2) {
      const vals = hist.map(e => e.debit);
      max24h = Math.max(...vals);
      min24h = Math.min(...vals);
      const oldest = hist[0].debit;
      var24h = ((debit - oldest) / (oldest || 1)) * 100;
    }
  } catch(e) { /* localStorage non disponible */ }

  return { debit, history: [debit], trend, timestamp, var24h, max24h, min24h };
}

// ─── Load a single station ───────────────────────────────────────────────────
async function loadStation(stationId) {
  state[stationId].status = 'loading';
  state[stationId].msg = 'Chargement...';
  renderCard(stationId);

  try {
    const [data, sun] = await Promise.all([
      fetchDebit(stationId),
      fetchSunTimes(stationId)
    ]);
    state[stationId].debit = data.debit;
    state[stationId].history = data.history;
    state[stationId].trend = data.trend;
    state[stationId].var24h = data.var24h;
    state[stationId].max24h = data.max24h;
    state[stationId].min24h = data.min24h;
    if (sun) {
      state[stationId].sunrise = sun.sunrise;
      state[stationId].sunset  = sun.sunset;
    }
    state[stationId].status = 'ok';
    state[stationId].msg = data.timestamp ? `Mesure : ${data.timestamp}` : 'Données reçues';
  } catch(e) {
    state[stationId].status = 'error';
    state[stationId].msg = 'Erreur — ' + (e.message || 'inconnu');
  }

  renderCard(stationId);
}

// ─── Refresh all ────────────────────────────────────────────────────────────
function refreshAll() {
  const btn = document.getElementById('refreshAll');
  btn.classList.add('loading');
  btn.textContent = '↻ Chargement...';

  const promises = STATIONS.map(s => loadStation(s.id));
  Promise.all(promises).then(() => {
    btn.classList.remove('loading');
    btn.textContent = '↻ Actualiser';
    const now = new Date();
    document.getElementById('lastUpdate').textContent =
      `Dernière mise à jour : ${now.toLocaleDateString('fr-CA')} ${now.toLocaleTimeString('fr-CA', {hour:'2-digit', minute:'2-digit'})}`;
  });
}

// ─── Sunrise / Sunset — sunrisesunset.io (gratuit, sans clé) ─────────────────
async function fetchSunTimes(stationId) {
  const s = STATIONS.find(x => x.id === stationId);
  if (!s) return null;
  try {
    const res = await fetch(
      `https://api.sunrisesunset.io/json?lat=${s.lat}&lng=${s.lng}&timezone=America/Toronto&time_format=HH:mm`,
      { cache: 'no-store' }
    );
    const json = await res.json();
    if (json.status === 'OK') {
      return { sunrise: json.results.sunrise, sunset: json.results.sunset };
    }
  } catch(e) {}
  return null;
}

// ─── (summary retiré) ────────────────────────────────────────────────────────

// ─── Sparkline SVG ──────────────────────────────────────────────────────────
function buildSparkline(history, color) {
  if (!history) return '<div style="height:60px;display:flex;align-items:center;justify-content:center;font-size:0.6rem;color:var(--muted)">—</div>';

  const W = 300, H = 60;
  const min = Math.min(...history);
  const max = Math.max(...history);
  const range = max - min || 1;
  const pts = history.map((v, i) => {
    const x = (i / (history.length - 1)) * W;
    const y = H - ((v - min) / range) * (H - 6) - 3;
    return `${x},${y}`;
  }).join(' ');

  const lastX = W;
  const lastY = H - ((history[history.length-1] - min) / range) * (H - 6) - 3;

  return `
    <svg class="linechart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="grad_${color.replace('--','')}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${getCSSVar(color)}" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="${getCSSVar(color)}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <polygon points="0,${H} ${pts} ${W},${H}" fill="url(#grad_${color.replace('--','')})" />
      <polyline points="${pts}" fill="none" stroke="${getCSSVar(color)}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${lastX}" cy="${lastY}" r="3" fill="${getCSSVar(color)}"/>
    </svg>`;
}

function getCSSVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

// ─── Mini spark bars ─────────────────────────────────────────────────────────
function buildMiniSpark(history, color) {
  if (!history) return '';
  const max = Math.max(...history);
  return history.map((v, i) => {
    const pct = Math.max(10, (v / max) * 100);
    const isLast = i === history.length - 1;
    const c = isLast ? getCSSVar(color) : 'var(--border)';
    return `<div class="spark-bar" style="height:${pct}%;background:${c}"></div>`;
  }).join('');
}

// ─── Render a single card ────────────────────────────────────────────────────
function renderCard(stationId) {
  const s = STATIONS.find(x => x.id === stationId);
  const st = state[stationId];
  const card = document.getElementById(`card-${stationId}`);
  if (!card) return;

  const colorVal = getCSSVar(s.color);
  card.style.setProperty('--card-color', colorVal);
  card.querySelector('.card-color-bar').style.background = colorVal;

  // Debit value
  const debitEl = card.querySelector('.debit-value');
  if (st.status === 'loading') {
    debitEl.innerHTML = '<span class="skeleton" style="display:inline-block;width:60px;height:1.2rem"></span>';
  } else if (st.debit !== null) {
    debitEl.textContent = st.debit.toFixed(1);
    debitEl.style.color = colorVal;
  } else {
    debitEl.textContent = '—';
    debitEl.style.color = 'var(--muted)';
  }

  // Trend badge
  const trendEl = card.querySelector('.trend-badge');
  if (st.trend === 'up') {
    trendEl.className = 'trend-badge trend-up';
    trendEl.textContent = '↑ Montante';
  } else if (st.trend === 'down') {
    trendEl.className = 'trend-badge trend-down';
    trendEl.textContent = '↓ Descendante';
  } else if (st.trend === 'stable') {
    trendEl.className = 'trend-badge trend-stable';
    trendEl.textContent = '→ Stable';
  } else {
    trendEl.className = 'trend-badge trend-stable';
    trendEl.textContent = '— N/D';
  }

  // Mini spark
  card.querySelector('.sparkline-row').innerHTML = buildMiniSpark(st.history || s.typique.map(()=>1), s.color);

  // Status msg
  const msgEl = card.querySelector('.status-msg');
  msgEl.textContent = st.msg || '';
  msgEl.className = 'status-msg' + (st.status === 'ok' ? ' ok' : st.status === 'error' ? ' err' : '');

  // Expanded detail
  if (st.expanded) {
    const varEl  = card.querySelector('.dv-var');
    const maxEl  = card.querySelector('.dv-max24');
    const minEl  = card.querySelector('.dv-min24');

    if (st.var24h !== null) {
      const sign = st.var24h >= 0 ? '+' : '';
      varEl.textContent = `${sign}${st.var24h.toFixed(1)} %`;
      varEl.style.color = st.var24h > 3 ? 'var(--up)' : st.var24h < -3 ? 'var(--down)' : 'var(--muted)';
    } else {
      varEl.textContent = 'N/D';
      varEl.style.color = 'var(--muted)';
    }
    maxEl.textContent = st.max24h !== null ? st.max24h.toFixed(1) + ' m³/s' : 'N/D';
    minEl.textContent = st.min24h !== null ? st.min24h.toFixed(1) + ' m³/s' : 'N/D';

    card.querySelector('.dv-sunrise').textContent = st.sunrise || 'N/D';
    card.querySelector('.dv-sunset').textContent  = st.sunset  || 'N/D';
  }
}

// ─── Toggle card expansion ───────────────────────────────────────────────────
function toggleCard(stationId) {
  const st = state[stationId];
  st.expanded = !st.expanded;
  const card = document.getElementById(`card-${stationId}`);
  if (st.expanded) {
    card.classList.add('expanded');
    if (st.status === 'idle') loadStation(stationId);
    else renderCard(stationId);
  } else {
    card.classList.remove('expanded');
  }
}

// ─── Filter ──────────────────────────────────────────────────────────────────
function filterStations(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.querySelectorAll('.card').forEach(card => {
    const id = card.dataset.id;
    const s = STATIONS.find(x => x.id === id);
    const st = state[id];
    let show = true;

    if (filter === 'gaspesie') show = s.region === 'gaspesie';
    else if (filter === 'bas-st-laurent') show = s.region === 'bas-st-laurent';
    else if (filter === 'up') show = st.trend === 'up';
    else if (filter === 'down') show = st.trend === 'down';

    card.style.display = show ? '' : 'none';
  });
}

// ─── Build all cards ──────────────────────────────────────────────────────────
function buildCards() {
  const grid = document.getElementById('stationGrid');
  grid.innerHTML = '';

  STATIONS.forEach(s => {
    const div = document.createElement('div');
    div.className = 'card';
    div.id = `card-${s.id}`;
    div.dataset.id = s.id;
    div.dataset.region = s.region;
    div.onclick = () => toggleCard(s.id);

    div.innerHTML = `
      <div class="card-color-bar" style="position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:8px 0 0 8px"></div>
      <div class="card-header" style="padding-left:8px">
        <div>
          <div class="river-name">${s.name}</div>
          <div class="station-id">STATION ${s.id}</div>
        </div>
        <div class="debit-main">
          <div class="debit-value" style="color:var(--muted)">—</div>
          <div class="debit-unit">m³/s</div>
          <div class="trend-badge trend-stable">— N/D</div>
        </div>
      </div>
      <div class="sparkline-row"></div>
      <div class="status-msg"></div>
      <div class="detail">
        <div class="detail-grid" style="grid-template-columns:1fr 1fr 1fr">
          <div class="detail-item">
            <div class="detail-label">Variation 24h</div>
            <div class="detail-val dv-var">—</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Max 24h</div>
            <div class="detail-val dv-max24">—</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Min 24h</div>
            <div class="detail-val dv-min24">—</div>
          </div>
        </div>
        <div class="detail-grid" style="grid-template-columns:1fr 1fr;margin-top:8px">
          <div class="detail-item">
            <div class="detail-label">🌅 Lever</div>
            <div class="detail-val dv-sunrise">—</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">🌇 Coucher</div>
            <div class="detail-val dv-sunset">—</div>
          </div>
        </div>
        <button class="fetch-btn" style="margin-top:10px" onclick="event.stopPropagation(); loadStation('${s.id}')">
          ↻ Recharger cette station
        </button>
      </div>`;

    grid.appendChild(div);
  });
}

// ─── Init ────────────────────────────────────────────────────────────────────
buildCards();
updateMoonDisplay();
// Filtre par défaut : Gaspésie
filterStations('gaspesie', document.querySelector('.filter-btn'));
// Auto-load on startup
refreshAll();
</script>

</body>
</html>
